name: Release

# Runs when you "do a release" any of these ways:
#   - push a version tag:   npm version patch && git push --follow-tags
#   - publish a GitHub Release in the UI
#   - click "Run workflow" (manual dispatch)
# It builds, tests, packages, and — when the Chrome Web Store secrets are set —
# uploads and publishes the new version to the store automatically.
#
# See docs/publishing.md for the one-time store setup and the four secrets:
#   CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

# Never run two publishes at once; queue rather than cancel (don't kill a publish).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run icons
      - run: npm run package

      - name: GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: myapps-launcher-v*.zip
          generate_release_notes: true

      - name: Detect Chrome Web Store secrets
        id: cws
        env:
          ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          if [ -n "$ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Chrome Web Store secrets not set — skipping store publish. See docs/publishing.md."
          fi

      - name: Upload & publish to the Chrome Web Store
        if: steps.cws.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          set -uo pipefail
          ZIP="$(ls myapps-launcher-v*.zip)"
          echo "Uploading $ZIP"
          if ! out="$(npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$ZIP" --extension-id "$EXTENSION_ID" --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" --refresh-token "$REFRESH_TOKEN" 2>&1)"; then
            echo "$out"
            # The store rejects uploads while a prior submission is in review.
            # Treat that as a soft skip (the GitHub release still succeeded).
            if echo "$out" | grep -qi "ITEM_NOT_UPDATABLE\|pending review"; then
              echo "::warning::A previous submission is still in review — this version was not uploaded. Re-run the release once it is published, or cancel the pending submission first."
              exit 0
            fi
            exit 1
          fi
          echo "$out"
          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "$EXTENSION_ID" --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" --refresh-token "$REFRESH_TOKEN"
