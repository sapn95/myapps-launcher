name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Generate icons (verify generator is reproducible)
        run: npm run icons

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build & package
        run: npm run package

      - name: Upload extension build
        uses: actions/upload-artifact@v7
        with:
          name: extension
          path: myapps-launcher-v*.zip
          if-no-files-found: error

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
